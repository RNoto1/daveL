<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Penis Master Mystery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a14;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        /* SCORE BAR - top */
        #ui {
            position: fixed;
            top: 0; left: 0; right: 0;
            color: #0f0; font-size: 16px; font-weight: bold;
            background: rgba(0,0,0,0.95);
            padding: 8px 16px;
            z-index: 30;
            text-align: center;
            border-bottom: 2px solid #0f0;
        }
        /* CANVAS AREA - middle */
        #gameArea {
            position: fixed;
            top: 38px;
            left: 0; right: 0;
            bottom: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
        }
        canvas {
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
        /* RPG DIALOGUE BOX - overlays bottom of canvas */
        #dialogueBox {
            position: fixed;
            bottom: 155px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.97);
            border: 3px solid #0f0;
            padding: 14px 22px;
            border-radius: 8px;
            color: #0f0;
            font-size: 17px;
            line-height: 1.4;
            text-align: center;
            min-width: 320px;
            max-width: 94vw;
            z-index: 25;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        /* D-PAD - bottom */
        #dpad {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            display: grid;
            grid-template-columns: 70px 70px 70px;
            grid-template-rows: 70px 70px;
            gap: 5px;
        }
        .db {
            width: 70px; height: 70px;
            background: rgba(0,255,0,0.1);
            border: 3px solid rgba(0,255,0,0.5);
            border-radius: 16px;
            color: #0f0; font-size: 30px;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .db:active { background: rgba(0,255,0,0.35); }
        .blank { visibility: hidden; }
    </style>
</head>
<body>
    <div id="ui">🔍 Penises: <span id="score">0</span>/7 &nbsp;|&nbsp; 🥚 Secrets: <span id="secs">0</span>/5</div>
    <div id="gameArea"><canvas id="c"></canvas></div>
    <div id="dialogueBox">Walk up to stuff and investigate!</div>
    <div id="dpad">
        <div class="blank"></div>
        <div class="db" id="bU">▲</div>
        <div class="blank"></div>
        <div class="db" id="bL">◀</div>
        <div class="db" id="bD">▼</div>
        <div class="db" id="bR">▶</div>
    </div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const GW = 480, GH = 420;
c.width = GW; c.height = GH;

// ===== STATE =====
let score = 0, secretCount = 0, phase = 'play', revealStart = 0, sparkles = [];

// ===== PLAYER =====
let px = 240, py = 300, pdir = 0, pSpeed = 2.2, pMoving = false;

// ===== INPUT =====
const kDown = {};
window.addEventListener('keydown', e => { kDown[e.code]=true; });
window.addEventListener('keyup', e => { kDown[e.code]=false; });
const mDir = {u:false,d:false,l:false,r:false};
function setupDir(id,key){
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();mDir[key]=true;});
    el.addEventListener('touchend',e=>{e.preventDefault();mDir[key]=false;});
    el.addEventListener('touchcancel',e=>{mDir[key]=false;});
}
setupDir('bU','u');setupDir('bD','d');setupDir('bL','l');setupDir('bR','r');

// ===== SOLIDS & INTERACTABLES =====
const solids = [];
const interactables = []; // 7 penis hiding spots
const eggList = [];

function addWall(x,y,w,h){solids.push({x,y,w,h,type:'wall'});}
function addPenisSpot(x,y,w,h,label,type){
    solids.push({x,y,w,h,type:type||'furniture'});
    interactables.push({x,y,w,h,label,triggered:false,kind:'penis'});
}

// ===== BUILD CLASSROOM =====
addWall(0,0,GW,22);addWall(0,398,GW,22);addWall(0,0,22,GH);addWall(458,0,22,GH);

// PENIS HIDING SPOTS (7 - spread out, not on desks)
addPenisSpot(160,22,160,18,'Chalkboard','chalkboard');  // 1. Behind chalkboard
addPenisSpot(72,28,28,28,'Clock','clock');               // 2. Inside the clock
addPenisSpot(430,100,28,80,'Bookshelf','shelf');          // 3. Behind a book
addPenisSpot(185,58,110,44,'Teacher Desk','desk');        // 4. Under the apple
addPenisSpot(360,30,80,48,'Pull-Down Map','map');         // 5. Behind map
addPenisSpot(130,320,32,28,'Backpack','backpack');        // 6. In backpack
addPenisSpot(200,380,80,16,'Window','window');             // 7. Behind curtain

// NON-HIDING-SPOT DESKS (these are just obstacles + named people)
solids.push({x:40,y:140,w:80,h:36,type:'desk'});   // Stuart Stew
solids.push({x:150,y:140,w:80,h:36,type:'desk'});   // Austin
solids.push({x:260,y:140,w:80,h:36,type:'desk'});   // Stephen C. Sucks
solids.push({x:370,y:140,w:80,h:36,type:'desk'});   // Dave's Desk
solids.push({x:40,y:250,w:80,h:36,type:'desk'});    // Joe R
solids.push({x:150,y:250,w:80,h:36,type:'desk'});   // Desk 6
solids.push({x:260,y:250,w:80,h:36,type:'desk'});   // Desk 7

// Lockers (solid, not penis spots)
solids.push({x:22,y:60,w:30,w:30,h:80,type:'locker'});
solids.push({x:22,y:160,w:30,h:80,type:'locker'});

// EASTER EGGS with Rich's punchlines
eggList.push({x:68,y:350,w:28,h:30,label:'Werewolf',msg:"Oh shit, a werewolf!",triggered:false});
eggList.push({x:400,y:55,w:28,h:32,label:'Lamp',msg:"Looks like this is glued down.",triggered:false});
eggList.push({x:300,y:225,w:32,h:14,label:'Twix',msg:"You should have put a ring pop on it.",triggered:false});
eggList.push({x:440,y:345,w:16,h:28,label:'CandyCorn',msg:"I'm not going to let you in me for no candy corn.",triggered:false});
eggList.push({x:30,y:370,w:24,h:24,label:'StopSign',msg:"I'm sorry, officer. I was waiting for it to turn green.",triggered:false});

// ===== DIALOGUE =====
let dTimer=0;
function say(text,dur){
    dur=dur||4000;
    document.getElementById('dialogueBox').textContent=text;
    clearTimeout(dTimer);
    if(dur>0)dTimer=setTimeout(()=>{
        if(phase==='play')document.getElementById('dialogueBox').textContent="Walk up to stuff and investigate!";
    },dur);
}
function updateUI(){
    document.getElementById('score').textContent=score;
    document.getElementById('secs').textContent=secretCount;
}

// ===== SPARKLES =====
function spawnSparkle(x,y){for(let i=0;i<14;i++)sparkles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:30+Math.random()*25,col:['#ff0','#f80','#0f0','#fff'][Math.floor(Math.random()*4)]});}
function updateSparkles(){for(let i=sparkles.length-1;i>=0;i--){let s=sparkles[i];s.x+=s.vx;s.y+=s.vy;s.life--;if(s.life<=0)sparkles.splice(i,1);}}
function drawSparkles(){sparkles.forEach(s=>{ctx.globalAlpha=s.life/55;ctx.fillStyle=s.col;ctx.fillRect(s.x-3,s.y-3,6,6);});ctx.globalAlpha=1;}

// ===== DRAW PENIS (bigger for mobile) =====
function drawPenis(cx,cy,sc){
    let s=sc||0.7;
    ctx.save();ctx.translate(cx,cy);ctx.scale(s,s);
    ctx.fillStyle='#ffd8b1';ctx.fillRect(-5,-25,10,25);
    ctx.fillStyle='#ffb888';ctx.beginPath();ctx.arc(0,-25,7,Math.PI,0);ctx.fill();
    ctx.fillStyle='#ee9977';ctx.beginPath();ctx.arc(0,-25,3.5,Math.PI,0);ctx.fill();
    ctx.fillStyle='#eebb99';
    ctx.beginPath();ctx.arc(-5,5,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,5,6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#cc9977';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-2,-8);ctx.lineTo(-2,-20);ctx.moveTo(2,-8);ctx.lineTo(2,-20);ctx.stroke();
    ctx.restore();
}

// ===== INTERACTION =====
function checkInteract(){
    let fx=px+8,fy=py+8,reach=20;
    if(pdir===0)fy+=reach;else if(pdir===1)fy-=reach;else if(pdir===2)fx-=reach;else fx+=reach;
    
    for(let obj of interactables){
        if(obj.triggered)continue;
        if(fx>obj.x-4&&fx<obj.x+obj.w+4&&fy>obj.y-4&&fy<obj.y+obj.h+4){
            obj.triggered=true;score++;updateUI();
            spawnSparkle(obj.x+obj.w/2,obj.y+obj.h/2);
            if(score===5){
                say("Penises are EVERYWHERE!",3000);
            }else{
                say(`Found a PENIS behind the ${obj.label}! (${score}/7)`);
            }
            if(score>=7)setTimeout(startReveal,1500);
            return;
        }
    }
    for(let egg of eggList){
        if(egg.triggered)continue;
        if(Math.hypot(px+8-(egg.x+egg.w/2),py+8-(egg.y+egg.h/2))<32){
            egg.triggered=true;secretCount++;updateUI();
            say(egg.msg,5500);spawnSparkle(egg.x+egg.w/2,egg.y+egg.h/2);
            return;
        }
    }
}

// ===== PLAYER MOVEMENT =====
function movePlayer(){
    let dx=0,dy=0;
    if(kDown['ArrowUp']||kDown['KeyW']||mDir.u){dy=-1;pdir=1;}
    if(kDown['ArrowDown']||kDown['KeyS']||mDir.d){dy=1;pdir=0;}
    if(kDown['ArrowLeft']||kDown['KeyA']||mDir.l){dx=-1;pdir=2;}
    if(kDown['ArrowRight']||kDown['KeyD']||mDir.r){dx=1;pdir=3;}
    if(dx!==0&&dy!==0){dx*=.707;dy*=.707;}
    pMoving=(dx!==0||dy!==0);
    let nx=px+dx*pSpeed,ny=py+dy*pSpeed;
    let pw=10,ph=10,pcx=nx+8,pcy=ny+8,blocked=false;
    for(let s of solids){if(pcx+pw/2>s.x&&pcx-pw/2<s.x+s.w&&pcy+ph/2>s.y&&pcy-ph/2<s.y+s.h){blocked=true;break;}}
    if(!blocked){px=nx;py=ny;}
    else{
        let bx=false,by=false;
        for(let s of solids){if(nx+8+pw/2>s.x&&nx+8-pw/2<s.x+s.w&&py+8+ph/2>s.y&&py+8-ph/2<s.y+s.h)bx=true;}
        for(let s of solids){if(px+8+pw/2>s.x&&px+8-pw/2<s.x+s.w&&ny+8+ph/2>s.y&&ny+8-ph/2<s.y+s.h)by=true;}
        if(!bx)px=nx;if(!by)py=ny;
    }
    px=Math.max(26,Math.min(GW-38,px));py=Math.max(26,Math.min(GH-38,py));
    if(pMoving)checkInteract();
}

// ===== DRAW CLASSROOM =====
function drawClassroom(){
    // Floor with better contrast
    ctx.fillStyle='#d4b088';ctx.fillRect(0,0,GW,GH);
    ctx.strokeStyle='#c0986a';ctx.lineWidth=1;
    for(let tx=0;tx<GW;tx+=42){for(let ty=0;ty<GH;ty+=42){
        ctx.strokeRect(tx,ty,42,42);
        if((Math.floor(tx/42)+Math.floor(ty/42))%2===0){ctx.fillStyle='rgba(0,0,0,0.04)';ctx.fillRect(tx,ty,42,42);}
    }}

    // Walls - darker for contrast
    ctx.fillStyle='#5a4a3a';ctx.fillRect(0,0,GW,22);ctx.fillRect(0,398,GW,22);
    ctx.fillRect(0,0,22,GH);ctx.fillRect(458,0,22,GH);
    ctx.fillStyle='#6a5a4a';ctx.fillRect(0,0,GW,3);ctx.fillRect(0,0,3,GH);
    ctx.fillStyle='#4a3a2a';ctx.fillRect(0,18,GW,4);ctx.fillRect(0,398,GW,4);

    // Door
    ctx.fillStyle='#6a4a2a';ctx.fillRect(220,398,40,22);
    ctx.fillStyle='#8a6a3a';ctx.fillRect(224,400,32,18);
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(250,410,3,0,Math.PI*2);ctx.fill();

    // === CLOCK (penis spot) ===
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(86,42,16,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=3;ctx.beginPath();ctx.arc(86,42,16,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#333';ctx.fillRect(85,28,2,14);ctx.fillRect(84,42,10,2);
    ctx.beginPath();ctx.arc(86,42,3,0,Math.PI*2);ctx.fill();
    // Clock number marks
    for(let i=0;i<12;i++){let a=i*Math.PI/6-Math.PI/2;ctx.fillRect(86+13*Math.cos(a)-1,42+13*Math.sin(a)-1,2,2);}
    if(interactables.find(i=>i.label==='Clock')?.triggered){drawPenis(86,42,0.5);}

    // === CHALKBOARD ===
    ctx.fillStyle='#1a6a1a';ctx.fillRect(160,22,160,18);
    ctx.strokeStyle='#B8903C';ctx.lineWidth=3;ctx.strokeRect(160,22,160,18);
    ctx.fillStyle='#B8903C';ctx.fillRect(170,38,140,4);
    // "Dave and Austin Rock" written on board
    ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText('Dave and Austin Rock',240,35);
    ctx.textAlign='start';
    // Chalk pieces
    ctx.fillStyle='#fff';ctx.fillRect(175,36,8,3);
    ctx.fillStyle='#ff0';ctx.fillRect(186,36,6,3);
    if(interactables.find(i=>i.label==='Chalkboard')?.triggered){drawPenis(240,32,0.45);}

    // === TEACHER'S DESK ===
    drawDesk(185,58,110,44,'#B8903C','#8a6a2a');
    // Apple on teacher's desk
    ctx.fillStyle='#cc0000';ctx.beginPath();ctx.arc(196,70,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a3a1a';ctx.fillRect(195,64,2,5);
    ctx.fillStyle='#33aa33';ctx.fillRect(196,62,4,3);
    if(interactables.find(i=>i.label==='Teacher Desk')?.triggered){drawPenis(240,75,0.55);}

    // === PULL-DOWN MAP ===
    ctx.fillStyle='#e8e8d0';ctx.fillRect(360,30,80,48);
    ctx.strokeStyle='#B8903C';ctx.lineWidth=2;ctx.strokeRect(360,30,80,48);
    ctx.fillStyle='#88ccaa';ctx.fillRect(370,40,25,25);
    ctx.fillStyle='#5588cc';ctx.fillRect(380,45,15,15);
    ctx.fillStyle='#B8903C';ctx.fillRect(360,28,80,5);
    if(interactables.find(i=>i.label==='Pull-Down Map')?.triggered){drawPenis(400,55,0.5);}

    // === BOOKSHELF ===
    ctx.fillStyle='#7a5a2a';ctx.fillRect(430,100,28,80);
    ctx.fillStyle='#8a6a3a';ctx.fillRect(432,102,24,76);
    let bkCols=['#cc3333','#3366cc','#33aa44','#cc8800','#aa33aa','#33aaaa'];
    for(let i=0;i<6;i++){ctx.fillStyle=bkCols[i];ctx.fillRect(434,104+i*12,20,10);ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(434,104+i*12,20,2);}
    if(interactables.find(i=>i.label==='Bookshelf')?.triggered){drawPenis(444,140,0.5);}

    // === STUDENT DESKS WITH NAMES ===
    drawDesk(40,140,80,36,'#9B7924','#7a5a14');  // Stuart Stew
    drawDesk(150,140,80,36,'#9B7924','#7a5a14');  // Austin
    drawDesk(260,140,80,36,'#9B7924','#7a5a14');  // Stephen C. Sucks
    drawDesk(370,140,80,36,'#9B7924','#7a5a14');  // Dave's Desk
    drawDesk(40,250,80,36,'#9B7924','#7a5a14');   // Joe R
    drawDesk(150,250,80,36,'#9B7924','#7a5a14');  // Desk 6
    drawDesk(260,250,80,36,'#9B7924','#7a5a14');  // Desk 7

    // Desk labels
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText('Stuart Stew',80,162);
    ctx.fillText('Austin',190,162);
    // Stephen C. Sucks - carved look
    ctx.fillStyle='#4a3a1a';ctx.font='bold 8px monospace';
    ctx.fillText('Stephen C.',300,156);ctx.fillText('SUCKS',300,166);
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';
    ctx.fillText("Dave's Desk",410,162);
    ctx.fillText('Joe R',80,272);
    ctx.fillText('Desk 6',190,272);
    ctx.fillText('Desk 7',300,272);
    ctx.textAlign='start';

    // NPCs at desks
    drawStudent(52,148,'#ff5555');  // Stuart Stew
    drawStudent(162,148,'#55ccff');  // Austin
    drawStudent(272,148,'#55ff55');  // Some kid
    drawStudent(382,148,'#ffaa00');  // Dave (orange)
    drawStudent(52,258,'#cc88ff');   // Joe R

    // === BACKPACK ===
    ctx.fillStyle='#cc3333';ctx.fillRect(132,322,28,24);
    ctx.fillStyle='#aa2222';ctx.fillRect(135,326,22,10);
    ctx.fillStyle='#882222';ctx.fillRect(138,336,6,8);ctx.fillRect(146,336,6,8);
    ctx.fillStyle='#FFD700';ctx.fillRect(142,326,4,3);
    if(interactables.find(i=>i.label==='Backpack')?.triggered){drawPenis(146,335,0.5);}

    // === WINDOW ===
    ctx.fillStyle='#5abae8';ctx.fillRect(200,380,80,16);
    ctx.strokeStyle='#B8903C';ctx.lineWidth=2;ctx.strokeRect(200,380,80,16);
    ctx.beginPath();ctx.moveTo(240,380);ctx.lineTo(240,396);ctx.stroke();
    ctx.beginPath();ctx.moveTo(200,388);ctx.lineTo(280,388);ctx.stroke();
    ctx.fillStyle='#7a3a6a';ctx.fillRect(196,378,8,20);ctx.fillRect(276,378,8,20);
    if(interactables.find(i=>i.label==='Window')?.triggered){drawPenis(240,388,0.4);}

    // === LOCKERS ===
    drawLocker(22,60,30,80);drawLocker(22,160,30,80);

    // === EASTER EGGS ===
    drawEggs();

    // === PROXIMITY HINTS ===
    drawHints();

    // === SPARKLES ===
    drawSparkles();

    // === PLAYER ===
    drawPlayerSprite();
}

function drawDesk(x,y,w,h,topCol,sideCol){
    ctx.fillStyle=topCol||'#9B7924';ctx.fillRect(x,y,w,h);
    ctx.fillStyle=sideCol||'#7a5a14';ctx.fillRect(x+2,y+2,w-4,3);
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(x,y+h-3,w,3);
    ctx.fillStyle='#5a3a0a';ctx.fillRect(x+3,y+h,4,5);ctx.fillRect(x+w-7,y+h,4,5);
}

function drawLocker(x,y,w,h){
    ctx.fillStyle='#2a7a5a';ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#1a6a4a';
    for(let i=0;i<4;i++)ctx.fillRect(x+4,y+8+i*18,w-8,3);
    ctx.fillStyle='#ccc';ctx.fillRect(x+w-7,y+h/2-3,4,6);
    ctx.fillStyle='#1a5a3a';for(let v=0;v<3;v++)ctx.fillRect(x+6,y+4+v*4,w-12,1);
}

function drawStudent(x,y,color){
    ctx.fillStyle=color;ctx.fillRect(x,y,10,14);
    ctx.beginPath();ctx.arc(x+5,y-3,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.fillRect(x+2,y-4,2,2);ctx.fillRect(x+6,y-4,2,2);
}

function drawEggs(){
    eggList.forEach(egg=>{
        if(egg.triggered)return;
        let x=egg.x,y=egg.y;
        if(egg.label==='Werewolf'){
            ctx.fillStyle='#8B6914';ctx.fillRect(x+4,y+10,18,18);
            ctx.beginPath();ctx.arc(x+13,y+7,9,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.moveTo(x+3,y);ctx.lineTo(x+6,y-10);ctx.lineTo(x+9,y);ctx.fill();
            ctx.beginPath();ctx.moveTo(x+15,y);ctx.lineTo(x+19,y-10);ctx.lineTo(x+23,y);ctx.fill();
            ctx.fillStyle='#ff0';ctx.fillRect(x+7,y+3,4,4);ctx.fillRect(x+15,y+3,4,4);
            ctx.fillStyle='#6a4914';ctx.fillRect(x+9,y+8,8,5);
            ctx.fillStyle='#fff';ctx.fillRect(x+10,y+11,2,3);ctx.fillRect(x+14,y+11,2,3);
        }
        else if(egg.label==='Lamp'){
            ctx.fillStyle='#999';ctx.fillRect(x+8,y+22,10,8);ctx.fillRect(x+4,y+28,18,4);
            ctx.fillStyle='#bbb';ctx.fillRect(x+11,y+8,4,14);
            ctx.fillStyle='#ffdd44';ctx.beginPath();
            ctx.moveTo(x,y+8);ctx.lineTo(x+26,y+8);ctx.lineTo(x+22,y-4);ctx.lineTo(x+4,y-4);
            ctx.closePath();ctx.fill();
            ctx.fillStyle='rgba(255,255,100,0.12)';ctx.beginPath();ctx.arc(x+13,y+8,18,0,Math.PI*2);ctx.fill();
        }
        else if(egg.label==='Twix'){
            ctx.fillStyle='#cc8833';ctx.fillRect(x,y,28,12);
            ctx.fillStyle='#e8c872';ctx.fillRect(x+2,y+2,24,8);
            ctx.fillStyle='#aa7733';ctx.fillRect(x+2,y+5,24,2);
            ctx.fillStyle='#aa0000';ctx.font='bold 7px monospace';ctx.fillText('TWIX',x+4,y+9);
        }
        else if(egg.label==='CandyCorn'){
            ctx.beginPath();ctx.moveTo(x+8,y);ctx.lineTo(x+16,y+24);ctx.lineTo(x,y+24);
            ctx.closePath();ctx.fillStyle='#fff';ctx.fill();
            ctx.beginPath();ctx.moveTo(x+8,y);ctx.lineTo(x+12,y+8);ctx.lineTo(x+4,y+8);
            ctx.closePath();ctx.fillStyle='#ffcc00';ctx.fill();
            ctx.beginPath();ctx.moveTo(x+4,y+8);ctx.lineTo(x+12,y+8);ctx.lineTo(x+14,y+15);ctx.lineTo(x+2,y+15);
            ctx.closePath();ctx.fillStyle='#ff8800';ctx.fill();
        }
        else if(egg.label==='StopSign'){
            ctx.fillStyle='#888';ctx.fillRect(x+9,y+16,4,8);
            ctx.fillStyle='#cc0000';ctx.beginPath();
            let cx2=x+11,cy2=y+8,r=9;
            for(let i=0;i<8;i++){let a=(Math.PI/8)+(i*Math.PI/4);let sx2=cx2+r*Math.cos(a),sy2=cy2+r*Math.sin(a);if(i===0)ctx.moveTo(sx2,sy2);else ctx.lineTo(sx2,sy2);}
            ctx.closePath();ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
            ctx.fillStyle='#fff';ctx.font='bold 5px monospace';ctx.textAlign='center';ctx.fillText('STOP',cx2,cy2+2);ctx.textAlign='start';
        }
    });
}

function drawHints(){
    interactables.forEach(obj=>{
        if(obj.triggered)return;
        let d=Math.hypot(px+8-(obj.x+obj.w/2),py+8-(obj.y+obj.h/2));
        if(d<60){
            ctx.fillStyle=`rgba(255,170,0,${0.5+0.4*Math.sin(Date.now()/120)})`;
            ctx.font='bold 18px monospace';ctx.textAlign='center';
            ctx.fillText('!',obj.x+obj.w/2,obj.y-10);ctx.textAlign='start';
        }
    });
    eggList.forEach(egg=>{
        if(egg.triggered)return;
        let d=Math.hypot(px+8-(egg.x+egg.w/2),py+8-(egg.y+egg.h/2));
        if(d<50){
            ctx.fillStyle=`rgba(0,200,255,${0.5+0.4*Math.sin(Date.now()/120)})`;
            ctx.font='bold 16px monospace';ctx.textAlign='center';
            ctx.fillText('?',egg.x+egg.w/2,egg.y-10);ctx.textAlign='start';
        }
    });
}

function drawPlayerSprite(){
    let x=px,y=py;
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(x+8,y+28,9,3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3366cc';
    if(pMoving){let o=Math.sin(Date.now()/70)*3;ctx.fillRect(x+3,y+22,5,5+o);ctx.fillRect(x+10,y+22,5,5-o);}
    else{ctx.fillRect(x+3,y+22,5,5);ctx.fillRect(x+10,y+22,5,5);}
    ctx.fillStyle='#5a3a1a';
    if(pMoving){let o=Math.sin(Date.now()/70)*2;ctx.fillRect(x+2,y+26+o,7,3);ctx.fillRect(x+9,y+26-o,7,3);}
    else{ctx.fillRect(x+2,y+26,7,3);ctx.fillRect(x+9,y+26,7,3);}
    ctx.fillStyle='#ffaa00';ctx.fillRect(x+2,y+12,12,12);
    ctx.fillStyle='#ffddaa';
    if(pMoving){let o=Math.sin(Date.now()/70)*4;ctx.fillRect(x-1,y+14+o,5,8);ctx.fillRect(x+13,y+14-o,5,8);}
    else{ctx.fillRect(x-1,y+14,5,8);ctx.fillRect(x+13,y+14,5,8);}
    ctx.fillStyle='#ffddaa';ctx.fillRect(x+2,y+1,12,12);
    ctx.fillStyle='#cc0000';ctx.fillRect(x+1,y-2,14,5);
    if(pdir===3)ctx.fillRect(x+12,y-1,6,3);else if(pdir===2)ctx.fillRect(x-4,y-1,6,3);else ctx.fillRect(x+12,y-1,6,3);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+8,y-1,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    if(pdir===0){ctx.fillRect(x+4,y+5,2,2);ctx.fillRect(x+10,y+5,2,2);ctx.fillRect(x+5,y+9,6,1);}
    else if(pdir===1){ctx.fillStyle='#553300';ctx.fillRect(x+2,y+1,12,5);}
    else if(pdir===2){ctx.fillRect(x+3,y+5,2,2);ctx.fillRect(x+7,y+5,2,2);}
    else{ctx.fillRect(x+7,y+5,2,2);ctx.fillRect(x+11,y+5,2,2);}
}

// ===== REVEAL CUTSCENE =====
function startReveal(){phase='reveal';revealStart=Date.now();say("ALL 7 PENISES FOUND! Confronting the class...",0);}

function drawReveal(){
    let t=Date.now()-revealStart;
    let cw=GW,ch=GH;
    ctx.fillStyle='rgba(0,0,0,0.98)';ctx.fillRect(0,0,cw,ch);

    if(t<2500){
        ctx.fillStyle='#fff';ctx.font='bold 22px monospace';ctx.textAlign='center';
        ctx.fillText("All evidence points to...",cw/2,ch/2-40);
        ctx.fillStyle='#ffaa00';ctx.font='bold 30px monospace';
        ctx.fillText("▼ ▼ ▼",cw/2,ch/2+20);ctx.textAlign='start';
    }
    else if(t<5500){
        ctx.textAlign='center';ctx.fillStyle='#aaa';ctx.font='15px monospace';

        ctx.fillStyle='#553300';ctx.fillRect(dx+10,dy-30,40,10);
        ctx.fillStyle='#ffddaa';ctx.fillRect(dx+10,dy-20,40,30);
        ctx.fillStyle='#000';ctx.fillRect(dx+18,dy-14,8,8);ctx.fillRect(dx+34,dy-14,8,8);
        ctx.fillStyle='#800';ctx.fillRect(dx+20,dy-2,20,6);
        ctx.fillStyle='#ffaa00';ctx.fillRect(dx,dy+10,60,50);
        ctx.textAlign='start';
    }
    else if(t<10000){
        let shake=(Date.now()%80<40)?3:-3;
        ctx.textAlign='center';
        ctx.strokeStyle='#ffaa00';ctx.lineWidth=8;
        ctx.beginPath();ctx.moveTo(cw/2-35,180);ctx.lineTo(cw/2-70,110);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cw/2+35,180);ctx.lineTo(cw/2+70,110);ctx.stroke();
        ctx.fillStyle='#ffaa00';ctx.fillRect(cw/2-30,160,60,50);
        let headBob=Math.abs(Math.sin(t/100))*8;
        ctx.fillStyle='#ffddaa';ctx.fillRect(cw/2-22,125-headBob,44,32);
        ctx.fillStyle='#553300';ctx.fillRect(cw/2-20,120-headBob,40,8);
        ctx.fillStyle='#000';ctx.fillRect(cw/2-14,130-headBob,10,10);ctx.fillRect(cw/2+4,130-headBob,10,10);
        ctx.fillStyle='#800';ctx.fillRect(cw/2-10,148-headBob,20,8);
        ctx.fillStyle='#ff0';ctx.font='bold 22px monospace';
        ctx.fillText('"I AM THE',cw/2+shake,65);
        ctx.font='bold 28px monospace';
        ctx.fillText('PENIS MASTER!"',cw/2+shake,95);
        // Teacher crying
        let ty=260;
        ctx.fillStyle='#888';ctx.fillRect(cw/2-20,ty,40,50);
        ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(cw/2,ty-10,20,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#000';ctx.fillRect(cw/2-8,ty-15,5,5);ctx.fillRect(cw/2+3,ty-15,5,5);
        ctx.fillStyle='#600';ctx.beginPath();ctx.arc(cw/2,ty,7,0,Math.PI);ctx.fill();
        ctx.fillStyle='rgba(100,150,255,0.7)';
        for(let i=0;i<12;i++){let tearY=ty+10+((t*.6+i*25)%70);ctx.beginPath();ctx.arc(cw/2+(i-6)*12,tearY,3,0,Math.PI*2);ctx.fill();}
        ctx.fillStyle='#88f';ctx.font='13px monospace';
        ctx.fillText("*sobbing uncontrollably*",cw/2,ty+75);
        ctx.textAlign='start';
    }
    // === UFO BEAM-UP ===
    else if(t<14500){
        let ufo_t=t-10000;
        ctx.textAlign='center';

        // Dark sky background
        ctx.fillStyle='#0a0a2e';ctx.fillRect(0,0,cw,ch);
        // Stars
        ctx.fillStyle='#fff';
        for(let i=0;i<30;i++){ctx.fillRect((i*127+50)%cw,(i*89+30)%(ch*.5),2,2);}

        // UFO at top
        let ufoY=40;
        ctx.fillStyle='#aaa';ctx.fillRect(cw/2-40,ufoY,80,20);
        ctx.fillStyle='#ccc';ctx.beginPath();ctx.ellipse(cw/2,ufoY+10,45,12,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#0f0';ctx.beginPath();ctx.ellipse(cw/2,ufoY+5,25,10,0,0,Math.PI*2);ctx.fill();
        // Dome
        ctx.fillStyle='rgba(100,255,100,0.3)';ctx.beginPath();ctx.ellipse(cw/2,ufoY-5,20,15,0,0,Math.PI*2);ctx.fill();
        // Lights
        for(let i=0;i<5;i++){
            ctx.fillStyle=['#ff0','#f0f','#0ff','#ff0','#f0f'][i];
            ctx.beginPath();ctx.arc(cw/2-30+i*15,ufoY+18,3,0,Math.PI*2);ctx.fill();
        }

        // Tractor beam
        let beamAlpha=Math.min(1,ufo_t/1000)*0.3;
        ctx.fillStyle=`rgba(100,255,100,${beamAlpha})`;
        ctx.beginPath();ctx.moveTo(cw/2-15,ufoY+20);ctx.lineTo(cw/2-50,ch);ctx.lineTo(cw/2+50,ch);ctx.lineTo(cw/2+15,ufoY+20);ctx.closePath();ctx.fill();

        // Dave floating upward in beam
        let floatProgress=Math.min(1,ufo_t/3500);
        let daveY=ch-80-floatProgress*(ch-160);
        ctx.fillStyle='#ffaa00';ctx.fillRect(cw/2-15,daveY,30,35);
        ctx.fillStyle='#ffddaa';ctx.fillRect(cw/2-10,daveY-15,20,18);
        ctx.fillStyle='#000';ctx.fillRect(cw/2-6,daveY-10,5,5);ctx.fillRect(cw/2+1,daveY-10,5,5);
        ctx.fillStyle='#800';ctx.fillRect(cw/2-5,daveY,10,4);

        if(ufo_t>800){

    else{drawLoonyBin(t);}
}

function drawLoonyBin(t){
    phase='loony';
    let cw=GW,ch=GH;
    ctx.fillStyle='#c8b89a';ctx.fillRect(0,0,cw,ch);
    ctx.strokeStyle='#a89878';ctx.lineWidth=2;
    for(let i=0;i<16;i++){ctx.beginPath();ctx.moveTo(i*(cw/14),0);ctx.lineTo(i*(cw/14),ch);ctx.stroke();}
    for(let j=0;j<12;j++){ctx.beginPath();ctx.moveTo(0,j*(ch/10));ctx.lineTo(cw,j*(ch/10));ctx.stroke();}
    ctx.fillStyle='#4a9aba';ctx.fillRect(cw/2-40,30,80,60);
    ctx.strokeStyle='#555';ctx.lineWidth=3;
    for(let b=0;b<4;b++){ctx.beginPath();ctx.moveTo(cw/2-32+b*22,30);ctx.lineTo(cw/2-32+b*22,90);ctx.stroke();}
    let rock=Math.sin(t/350)*14,tx=cw/2+rock,ty=ch/2-20;
    ctx.fillStyle='#eee';ctx.fillRect(tx-22,ty+20,44,55);
    ctx.strokeStyle='#aaa';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(tx-30,ty+30);ctx.lineTo(tx+30,ty+35);ctx.stroke();
    ctx.beginPath();ctx.moveTo(tx-30,ty+45);ctx.lineTo(tx+30,ty+50);ctx.stroke();
    ctx.fillStyle='#ccc';ctx.beginPath();ctx.arc(tx,ty,18,0,Math.PI*2);ctx.fill();
    let ea=t/120;
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(tx-6+Math.cos(ea)*3,ty-3+Math.sin(ea)*2,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(tx+6+Math.cos(ea+1)*3,ty-3+Math.sin(ea+1)*2,3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.beginPath();ctx.arc(tx,ty+7,5,0,Math.PI);ctx.stroke();
    ctx.fillStyle='#333';ctx.font='14px monospace';ctx.textAlign='center';
    ctx.fillText("...penis master... penis master...",cw/2,ty+95);
    ctx.fillStyle='#000';ctx.font='bold 16px monospace';
    ctx.fillText("The teacher was never the same.",cw/2,ty+125);
    ctx.font='12px monospace';ctx.fillStyle='#555';
    ctx.fillText("They kept muttering about the penis master...",cw/2,ty+148);
    if(t>21000){ctx.fillStyle='#0f0';ctx.font='18px monospace';ctx.fillText("TAP TO PLAY AGAIN",cw/2,ch-40);phase='done';}
    ctx.textAlign='start';
}

// ===== RESET =====
function resetGame(){
    score=0;secretCount=0;phase='play';px=240;py=300;
    interactables.forEach(o=>o.triggered=false);
    eggList.forEach(e=>e.triggered=false);
    sparkles=[];updateUI();say("Walk up to stuff and investigate!");
}
c.addEventListener('click',()=>{if(phase==='done')resetGame();});
c.addEventListener('touchstart',e=>{if(phase==='done'){e.preventDefault();resetGame();}},{passive:false});

// ===== MAIN LOOP =====
function loop(){
    if(phase==='play'){movePlayer();updateSparkles();drawClassroom();}
    else drawReveal();
    requestAnimationFrame(loop);
}
loop();
